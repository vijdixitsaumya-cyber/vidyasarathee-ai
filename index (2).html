// ── HELPERS ───────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function callAI(system, user, onToken) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system,
        messages: [{ role: "user", content: user }],
      }),
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text || "").join("") || "";
    if (onToken) {
      for (let i = 0; i <= text.length; i += 5) {
        onToken(text.slice(0, i));
        await sleep(12);
      }
      onToken(text);
    }
    return text;
  } catch (e) { return "Error: " + e.message; }
}

async function callAIJSON(system, user) {
  const t = await callAI(system, user);
  try { return JSON.parse(t.replace(/```json|```/g, "").trim()); }
  catch { return null; }
}

    await sleep(400);

    // Step 2: Predictor
    setAgent("predictor", { status:"running", log:"" });
    addLog("🔮 Predictor Agent: Questions generate ho rahe hain...", T.saffron);

      "Tum UPSC question prediction AI ho. Based on recent patterns, predict high-probability questions. Hindi+English mix.",

      t => { predOut = t; setAgent("predictor", { status:"running", log:t }); }
    );
    setAgent("predictor", { status:"done", log:predOut });
    addLog("✅ Predictor: 3 high-prob questions ready", T.green);
    await sleep(400);

    // Step 3: Syllabus Mapper
    setAgent("syllabus", { status:"running", log:"" });
    addLog("🗺️ Syllabus Mapper: Topics map ho rahe hain...", T.blue);

      "Tum UPSC syllabus mapping AI ho. News topics ko official UPSC syllabus se map karo. Table format mein.",

      t => { mapOut = t; setAgent("syllabus", { status:"running", log:t }); }
    );
    setAgent("syllabus", { status:"done", log:mapOut });
    addLog("✅ Syllabus Mapper: Mapping complete", T.green);
    await sleep(400);

    // Step 4: Alert Agent
    setAgent("alert", { status:"running", log:"" });
    addLog("🔔 Alert Agent: Student alerts prepare ho rahe hain...", T.red);
    let alertOut = "";
    await callAI(
      "Tum UPSC smart alert system ho. Important upcoming topics ke liye concise alerts banao. Motivating tone.",

    setAgent("evaluator",{ status:"idle", log:"Ready for answer submissions." });

                <Chip label={`${q.prob}% PROB`} color={T.green} />
              </div>
              <div style={{ fontSize:13, color:T.text, lineHeight:1.7, marginBottom:10, fontStyle:"italic" }}>{q.q}</div>
              <div style={{ fontSize:11, color:T.textDim, marginBottom:6, fontFamily:"monospace" }}>KEY POINTS TO COVER:</div>
              {q.keyPoints.map((kp,i) => <div key={i} style={{ fontSize:12, color:T.textMid, marginBottom:3 }}>→ {kp}</div>)}

          ))}

      )}

      {/* AI-generated predictions */}
      {predictions && (
        <Card glow={T.saffron}>
          <div style={{ fontSize:9, color:T.saffron, fontFamily:"monospace", letterSpacing:3, marginBottom:14 }}>AI ANALYSIS RESULT</div>

            <div style={{ background:T.panel, borderRadius:8, padding:"12px 14px", marginBottom:14 }}>

                <div>🔢 Gap: <span style={{ color:T.text }}>{predictions.analysis.years_gap}</span></div>
                <div>💡 Why likely: <span style={{ color:T.text }}>{predictions.analysis.probability_reason}</span></div>

          {(predictions.predicted_questions||[]).map((pq,qi) => (
            <div key={qi} style={{ background:T.panel, borderRadius:10, padding:"14px", marginTop:10 }}>
              <div style={{ fontSize:13, color:T.text, lineHeight:1.7, marginBottom:8 }}>{pq.q}</div>
              {pq.opts && pq.opts.map((opt,oi) => {
                let bg=T.card, border=T.border, color=T.text;
                if (quizAns[`ai${qi}`] !== undefined) {
                  if (oi===pq.ans) { bg="#00C89615"; border=T.green+"50"; color=T.green; }
                  else if (oi===quizAns[`ai${qi}`] && oi!==pq.ans) { bg="#FF454515"; border=T.red+"50"; color=T.red; }

                return (
                  <div key={oi} onClick={() => handleAns(`ai${qi}`, oi, pq.ans)} style={{

}

// ═══════════════════════════════════════════════════
//  MODULE 3 — MAINS ANSWER WRITING + EVALUATION
// ═══════════════════════════════════════════════════
function MainsEvaluator({ addXP }) {
  const [question, setQuestion]   = useState("");
  const [answer, setAnswer]       = useState("");
  const [paper, setPaper]         = useState("GS2");
  const [result, setResult]       = useState(null);
  const [loading, setLoading]     = useState(false);

  const evaluate = async () => {
    if (!question.trim() || !answer.trim()) return;
    setLoading(true); setResult(null);
    const res = await callAIJSON(
      `You are a senior UPSC examiner. Evaluate this ${paper} answer strictly. Respond ONLY in valid JSON:
{"total":{"score":7,"max":10},"parameters":{"introduction":{"score":1.5,"max":2,"feedback":"..."},"body_content":{"score":3,"max":5,"feedback":"..."},"conclusion":{"score":1,"max":2,"feedback":"..."}, "language":{"score":0.5,"max":1,"feedback":"..."}},"missing_points":["...","..."],"strengths":["..."],"improved_introduction":"...","examiner_comment":"...","grade":"B+"}`,
      `Paper: ${paper}\nQuestion: ${question}\nAnswer: ${answer}`
    );
    if (res) { setResult(res); addXP(35); }
    setLoading(false);
  };

  const gc = (s,m) => { const p=s/m; return p>=0.7?T.green:p>=0.5?T.saffron:T.red; };

  return (
    <div>
      <SecHead icon="✍️" label="MAINS ANSWER EVALUATOR" color={T.purple}
        sub="UPSC examiner AI — 10/10 scale, parameter-wise feedback" />

      <Card style={{ marginBottom:14 }}>
        <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
          {["GS1","GS2","GS3","GS4","Essay"].map(p => (
            <button key={p} onClick={() => setPaper(p)} style={{
              padding:"6px 14px", borderRadius:20, cursor:"pointer", fontSize:11, fontFamily:"monospace",
              background:paper===p?T.purpleLo:T.panel,
              border:`1px solid ${paper===p?T.purple:T.border}`,
              color:paper===p?T.purple:T.textMid,
            }}>{p}</button>
          ))}
        </div>

        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:9, color:T.textDim, fontFamily:"monospace", letterSpacing:3, marginBottom:6 }}>QUESTION</div>
          <textarea value={question} onChange={e=>setQuestion(e.target.value)} rows={2}
            placeholder="Question yahan likho ya AI-suggested question select karo..."
            style={{ width:"100%", background:T.panel, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 12px", color:T.text, fontSize:13, resize:"none", outline:"none", boxSizing:"border-box" }} />
        </div>
        <div style={{ marginBottom:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
            <div style={{ fontSize:9, color:T.textDim, fontFamily:"monospace", letterSpacing:3 }}>TUMHARA ANSWER</div>
            <div style={{ fontSize:10, color:T.textDim }}>{answer.split(" ").filter(Boolean).length} words</div>
          </div>
          <textarea value={answer} onChange={e=>setAnswer(e.target.value)} rows={7}
            placeholder="Apna complete answer likho — introduction, body (3 paragraphs), conclusion..."
            style={{ width:"100%", background:T.panel, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 12px", color:T.text, fontSize:13, resize:"vertical", outline:"none", boxSizing:"border-box" }} />
        </div>

        {/* Sample questions */}
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
          {QUESTION_BANK.mains.filter(q=>q.paper===paper).map((q,i) => (
            <button key={i} onClick={() => setQuestion(q.q)} style={{
              padding:"5px 10px", borderRadius:6, cursor:"pointer", fontSize:10,
              background:T.panel, border:`1px solid ${T.border}`, color:T.textMid, fontFamily:"monospace",
            }}>Use Sample Q{i+1}</button>
          ))}
        </div>

        <button onClick={evaluate} disabled={loading||!question.trim()||!answer.trim()} style={{
          width:"100%", padding:"12px", borderRadius:8, border:"none",
          background:loading?T.panel:`linear-gradient(135deg,${T.purple},#8040CC)`,
          color:loading?T.textDim:"#fff", fontSize:13, fontWeight:700, fontFamily:"monospace",
          letterSpacing:1, cursor:loading?"not-allowed":"pointer", transition:"all 0.3s",
        }}>
          {loading?"⏳ Evaluating...":"🎯 AI Examiner se Evaluate Karao (+35 XP)"}
        </button>
      </Card>

      {result && (
        <Card glow={T.purple}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontSize:9, color:T.purple, fontFamily:"monospace", letterSpacing:3 }}>EXAMINER VERDICT</div>
              <div style={{ fontSize:28, fontWeight:700, color:T.text, fontFamily:"monospace", marginTop:4 }}>
                {result.total?.score}/{result.total?.max}{" "}
                <span style={{ fontSize:16, color:gc(result.total?.score||0,result.total?.max||10) }}>
                  Grade: {result.grade}
                </span>
              </div>
            </div>
            <div style={{ width:64, height:64, borderRadius:"50%", border:`3px solid ${gc(result.total?.score||0,result.total?.max||10)}`, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ fontSize:22, fontWeight:700, color:gc(result.total?.score||0,result.total?.max||10), fontFamily:"monospace" }}>
                {Math.round(((result.total?.score||0)/(result.total?.max||10))*100)}%
              </span>
            </div>
          </div>

          {result.examiner_comment && (
            <div style={{ background:T.purpleLo, borderRadius:8, padding:"12px 14px", marginBottom:14, fontSize:13, color:T.textMid, lineHeight:1.7, fontStyle:"italic", border:`1px solid ${T.purple}30` }}>
              "{result.examiner_comment}"
            </div>
          )}

          {Object.entries(result.parameters||{}).map(([key,val]) => (
            <div key={key} style={{ background:T.panel, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <span style={{ fontSize:12, color:T.text, textTransform:"capitalize" }}>{key.replace("_"," ")}</span>
                <span style={{ fontSize:12, color:gc(val.score,val.max), fontFamily:"monospace" }}>{val.score}/{val.max}</span>
              </div>
              <PBar val={val.score} max={val.max} color={gc(val.score,val.max)} />
              <div style={{ fontSize:11, color:T.textMid, marginTop:6 }}>{val.feedback}</div>
            </div>
          ))}

          {result.missing_points?.length > 0 && (
            <div style={{ background:"#FF454510", borderRadius:8, padding:"10px 14px", marginTop:10, border:`1px solid ${T.red}30` }}>
              <div style={{ fontSize:9, color:T.red, fontFamily:"monospace", letterSpacing:3, marginBottom:6 }}>MISSING POINTS</div>
              {result.missing_points.map((p,i) => <div key={i} style={{ fontSize:12, color:"#FCA5A5", marginBottom:3 }}>• {p}</div>)}
            </div>
          )}

          {result.improved_introduction && (
            <div style={{ background:T.greenLo, borderRadius:8, padding:"10px 14px", marginTop:10, border:`1px solid ${T.green}30` }}>
              <div style={{ fontSize:9, color:T.green, fontFamily:"monospace", letterSpacing:3, marginBottom:6 }}>BEHTAREEN INTRO EXAMPLE</div>
              <div style={{ fontSize:12, color:"#6EE7B7", lineHeight:1.7, fontStyle:"italic" }}>{result.improved_introduction}</div>
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

function CurrentAffairs({ addXP }) {

  const [source, setSource]     = useState("The Hindu");

  const analyze = async (h) => {

{"relevance_score":85,"importance":"HIGH","exams_relevant":["UPSC Prelims","UPSC Mains GS3"],"gs_papers":["GS3"],"syllabus_topics":["Infrastructure","Economy"],"prelims_angle":"...","mains_question":"...","static_links":["Topic 1","Topic 2"],"sources_to_read":["NCERT","Laxmikanth"],"one_liner":"Crisp one-liner for quick revision"}`,

  return (

              color:source===s?T.pink:T.textMid,

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8 }}>
          <div>
            <div style={{ fontSize:9, color:T.textDim, fontFamily:"monospace", marginBottom:6 }}>SAMPLE HEADLINES</div>

                <button key={i} onClick={() => { setHeadline(s); analyze(s); }} style={{
                  padding:"4px 10px", borderRadius:6, cursor:"pointer", fontSize:10,

                }}>Sample {i+1}</button>

          <button onClick={() => analyze()} disabled={loading||!headline.trim()} style={{
            padding:"10px 24px", borderRadius:8, border:"none",
            background:loading?T.panel:`linear-gradient(135deg,${T.pink},#CC3070)`,
            color:loading?T.textDim:"#fff", fontSize:12, fontWeight:700, fontFamily:"monospace",
            cursor:loading?"not-allowed":"pointer",
          }}>
            {loading?"⏳ Analyzing...":"🔍 Analyze (+20 XP)"}
          </button>
        </div>
      </Card>

      {analysis && (
        <Card glow={analysis.importance==="HIGH"?T.green:T.pink}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>

            <div style={{ background:T.panel, borderRadius:8, padding:"10px 12px", marginBottom:12, fontSize:13, color:T.saffron, fontStyle:"italic" }}>

              <div style={{ fontSize:9, color:T.textDim, fontFamily:"monospace", marginBottom:6 }}>SYLLABUS TOPICS</div>

          <div style={{ background:T.blueLo, borderRadius:8, padding:"10px 12px", marginBottom:10, border:`1px solid ${T.blue}30` }}>

            <div style={{ fontSize:12, color:T.textMid, lineHeight:1.6, fontStyle:"italic" }}>{analysis.mains_question}</div>
          </div>
        </Card>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
//  MODULE 5 — STUDENT PROGRESS + GAMIFICATION
// ═══════════════════════════════════════════════════
function StudentProgress({ userXP, streak }) {
  const [checked, setChecked]   = useState({});
  const level   = Math.floor(userXP/500)+1;
  const pct     = ((userXP%500)/500)*100;
  const titles  = ["Naya Shishya","Sadhak","Vidyarthi","Gyani","Topper","IAS Officer"];
  const title   = titles[Math.min(level-1, titles.length-1)];

  const subScores = Object.keys(SUBJECTS).reduce((a,s) => ({ ...a, [s]: Math.floor(Math.random()*50)+35 }), {});
  const weakSubs  = Object.entries(subScores).sort((a,b)=>a[1]-b[1]).slice(0,3);
  const strongSubs= Object.entries(subScores).sort((a,b)=>b[1]-a[1]).slice(0,2);

  return (
    <div>
      <SecHead icon="📊" label="PROGRESS + GAMIFICATION" color={T.gold} />

      {/* XP + Level */}
      <Card glow={T.gold} style={{ marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12, marginBottom:14 }}>
          <div>
            <div style={{ fontSize:9, color:T.gold, fontFamily:"monospace", letterSpacing:3 }}>TUMHARA LEVEL</div>
            <div style={{ fontSize:28, fontFamily:"monospace", fontWeight:700, color:"#fff" }}>
              Lv.{level} — <span style={{ color:T.gold }}>{title}</span>
            </div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:24, fontWeight:700, color:T.gold, fontFamily:"monospace" }}>{userXP} XP</div>
            <div style={{ fontSize:10, color:T.textDim }}>{500-(userXP%500)} XP to Lv.{level+1}</div>
          </div>
        </div>
        <PBar val={pct} max={100} color={T.gold} height={8} />

        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginTop:16 }}>
          {[["🔥","Streak",`${streak} days`],["💎","Total XP",`${userXP}`],["🏅","Rank","#284"]].map(([ic,lb,vl],i)=>(

//  MODULE 6 — VOICE AI MENTOR
// ═══════════════════════════════════════════════════
function VoiceMentor({ addXP }) {
  const [q, setQ]           = useState("");
  const [reply, setReply]   = useState("");
  const [loading, setLoading] = useState(false);
  const [listening, setListening] = useState(false);
  const [history, setHistory]  = useState([]);
  const recRef = useRef(null);
  const supportsVoice = "webkitSpeechRecognition" in window || "SpeechRecognition" in window;

  const speak = text => {
    window.speechSynthesis?.cancel();
    const utt = new SpeechSynthesisUtterance(text.slice(0,400).replace(/[*#`]/g,""));
    utt.lang = "hi-IN"; utt.rate = 0.88;
    const voices = window.speechSynthesis?.getVoices()||[];
    const hindi = voices.find(v=>v.lang.includes("hi"));
    if (hindi) utt.voice = hindi;
    window.speechSynthesis?.speak(utt);
  };

  const startVoice = () => {
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR) return;
    const r = new SR(); r.lang="hi-IN"; r.interimResults=true;
    r.onresult = e => setQ(Array.from(e.results).map(r=>r[0].transcript).join(""));
    r.onend = () => setListening(false);
    r.start(); recRef.current=r; setListening(true); setQ("");
  };

  const askAI = async (question) => {
    if (!question.trim()) return;
    setLoading(true); setReply("");
    let ans="";
    await callAI(
      "Tum VidyaSarathi AI Mentor ho — India ke best UPSC/UPPSC/SSC coach. Hindi mein warm, expert, concise replies do. Max 120 words. Always end with an encouragement.",
      question,
      t => { ans=t; setReply(t); }
    );
    speak(ans);
    setHistory(h=>[{q:question,a:ans},...h.slice(0,4)]);
    addXP(15);
    setLoading(false); setQ("");
  };

  const QUICK_QS = ["Aaj kya padhna chahiye?","Prelims strategy kya ho?","Current affairs kaise manage karein?","Mains answer kaise improve karein?","Motivation chahiye!"];

  return (
    <div>
      <SecHead icon="🎙️" label="VOICE AI MENTOR — HINDI" color={T.green}
        sub="Bolo ya likho — AI Hindi mein samjhayega aur bolega bhi" />

      <Card glow={listening?T.saffron:T.green} style={{ textAlign:"center", marginBottom:14 }}>
        <div style={{ fontSize:10, color:T.textMid, fontFamily:"monospace", marginBottom:14 }}>
          {listening?"🔴 Sun raha hun...":"Microphone tap karo ya neeche type karo"}
        </div>
        <div onClick={listening?()=>recRef.current?.stop():startVoice} style={{
          width:90, height:90, borderRadius:"50%", margin:"0 auto 14px",
          background:listening?`radial-gradient(circle,${T.saffron}40,${T.saffron}10)`:`radial-gradient(circle,${T.green}30,transparent)`,
          border:`2px solid ${listening?T.saffron:T.green}`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:36, cursor:"pointer",
          animation:listening?"voicePulse 1.2s ease-in-out infinite":"none",
          boxShadow:listening?`0 0 40px ${T.saffron}50`:"none",
        }}>
          {listening?"🎙️":"🎤"}
        </div>
        {q && <div style={{ background:T.panel, borderRadius:8, padding:"8px 12px", marginBottom:10, fontSize:13, color:T.text, border:`1px solid ${T.saffron}30` }}>🗣️ "{q}"</div>}
        {q && !listening && <button onClick={()=>askAI(q)} disabled={loading} style={{ padding:"9px 24px", borderRadius:8, background:`linear-gradient(135deg,${T.saffron},#D07000)`, border:"none", color:"#000", fontSize:12, fontWeight:700, cursor:"pointer" }}>{loading?"⏳...":"AI se Jawab Lo"}</button>}
        {!supportsVoice && <div style={{ fontSize:11, color:T.red, marginTop:8 }}>⚠ Voice browser mein nahi chala. Neeche type karo.</div>}
      </Card>

      <Card style={{ marginBottom:14 }}>
        <div style={{ display:"flex", gap:8 }}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&askAI(q)}
            placeholder="Koi bhi sawaal poochho — UPSC, strategy, concept..."
            style={{ flex:1, background:T.panel, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 12px", color:T.text, fontSize:13, fontFamily:"monospace", outline:"none" }} />
          <button onClick={()=>askAI(q)} disabled={loading||!q.trim()} style={{
            padding:"10px 18px", borderRadius:8, border:"none",
            background:loading||!q.trim()?T.panel:`linear-gradient(135deg,${T.green},#009970)`,
            color:loading||!q.trim()?T.textDim:"#000", fontSize:12, fontWeight:700, cursor:"pointer",
          }}>{loading?"...":"Puchho"}</button>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:10 }}>
          {QUICK_QS.map(qq=>(
            <button key={qq} onClick={()=>askAI(qq)} style={{
              padding:"5px 10px", borderRadius:16, cursor:"pointer", fontSize:10, fontFamily:"monospace",
              background:T.panel, border:`1px solid ${T.border}`, color:T.textMid,
            }}>{qq}</button>
          ))}
        </div>
      </Card>

      {(reply||loading) && (
        <Card glow={T.green} style={{ marginBottom:14 }}>
          <div style={{ fontSize:9, color:T.green, fontFamily:"monospace", letterSpacing:3, marginBottom:8 }}>AI MENTOR KA JAWAB</div>
          <div style={{ fontSize:14, color:T.text, lineHeight:1.8, whiteSpace:"pre-wrap" }}>
            {loading&&!reply?"⏳ Soch raha hun...":reply}
            {loading&&reply&&<span style={{ animation:"blink 1s infinite" }}>▌</span>}
          </div>
          {reply&&!loading&&(
            <div style={{ display:"flex", gap:8, marginTop:10 }}>
              <button onClick={()=>speak(reply)} style={{ padding:"6px 14px", borderRadius:6, background:T.greenLo, border:`1px solid ${T.green}40`, color:T.green, fontSize:11, cursor:"pointer" }}>🔊 Dobara Suno</button>
              <button onClick={()=>window.speechSynthesis?.cancel()} style={{ padding:"6px 14px", borderRadius:6, background:T.panel, border:`1px solid ${T.border}`, color:T.textMid, fontSize:11, cursor:"pointer" }}>⏹ Roko</button>
            </div>
          )}
        </Card>
      )}

      {history.length>0 && (
        <Card>
          <div style={{ fontSize:9, color:T.textDim, fontFamily:"monospace", letterSpacing:3, marginBottom:10 }}>PICHLE SAWAAL</div>
          {history.map((h,i)=>(
            <div key={i} style={{ background:T.panel, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <div style={{ fontSize:11, color:T.saffron, marginBottom:4 }}>❓ {h.q}</div>
              <div style={{ fontSize:11, color:T.textMid, lineHeight:1.5 }}>{h.a.slice(0,100)}...</div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}
